# Fly.io configuration for ragic-report demo deployment.
# Single-service: one VM serves both Express API and the built Vite SPA.
# Replace `app` with the name returned by `fly launch` before first deploy.

app = "ragic-report-demo"
primary_region = "nrt"

[build]

[env]
  DEMO_MODE = "true"
  NODE_ENV = "production"
  PORT = "3000"
  SERVE_FRONTEND_FROM_BACKEND = "true"
  FRONTEND_STATIC_DIR = "/app/frontend/dist"

[processes]
  app = "node dist/server.js"

# Persistent volume — SQLite read model + cache files + audit/notice json
# all live under /data so they survive deploys / machine restarts.
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
